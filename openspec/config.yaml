schema: spec-driven

context: |
  Tech stack: Python 3.13, Django 6.0.6, Django REST Framework 3.17, SQLite
  Architecture: Django project `config` + single app `clientes`, no DRF API wired yet
  Testing: pytest + pytest-django (planned, not yet configured)
  Style: PEP 8, no AI-generated code (project rule), snake_case fields, lowercase Spanish
    internal choice values, Spanish verbose_name

rules:
  proposal:
    - Include rollback plan for risky changes
    - Keep capability list short and concrete
  specs:
    - Use Given/When/Then for every scenario
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - One requirement = one observable behavior
  design:
    - Document architecture decisions with rationale and alternatives considered
    - Reference concrete file paths from the project
    - Sequence diagrams only when flows are non-obvious
  tasks:
    - Group by phase (day), use hierarchical numbering
    - Each task completable in one sitting (<= 90 min)
    - Mark day done only when its tests pass
  apply:
    - Follow existing code patterns and naming
    - Never suppress linting or test errors
    tdd: false
    test_command: "pytest"
  verify:
    test_command: "pytest"
    build_command: "python manage.py check"
    coverage_threshold: 0
  archive:
    - Verify all delta spec scenarios are COMPLIANT before archiving
    - Merge delta specs into openspec/specs/crm/spec.md
